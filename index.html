<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StageCue</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="toolbar">

<div class="logo">
🎬 StageCue
</div>

<div class="toolbar-buttons">

<button id="addBtn">
➕ Add Videos
</button>

<button id="outputBtn">
🖥 Output
</button>

<button id="blackBtn">
⬛ Black
</button>

<button id="fullscreenBtn">
⛶ Fullscreen
</button>

<input
type="file"
id="fileInput"
accept="video/*"
multiple
hidden>

</div>

</header>

<div class="main">

<!-- LEFT -->

<aside class="playlist-panel">

<div class="panel-title">

Playlist

<span id="clipCount">
0 clips
</span>

</div>

<div id="playlist">

<div class="empty">

Drop videos here

</div>

</div>

</aside>

<!-- CENTER -->

<section class="viewer">

<div class="preview">

<video
id="player"
preload="metadata"
controls
></video>

<div id="overlay">

READY

</div>

</div>

<div class="timeline">

<span id="currentTime">
00:00
</span>

<input
type="range"
id="seekBar"
min="0"
max="100"
value="0">

<span id="duration">
00:00
</span>

</div>

</section>

</div>

<footer class="transport">

<div class="controls">

<button id="prevBtn">
⏮
</button>

<button id="playBtn">
▶
</button>

<button id="pauseBtn">
⏸
</button>

<button id="stopBtn">
⏹
</button>

<button id="nextBtn">
⏭
</button>

</div>

<div class="volume">

🔊

<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">

</div>

<div class="loop">

<label>

<input
type="checkbox"
id="loopPlaylist">

Loop Playlist

</label>

</div>

</footer>

<div class="statusbar">

<div id="status">

Ready

</div>

<div id="filename">

No Clip Loaded

</div>

</div>

<script src="app.js"></script>

</body>
</html>
