<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>StageCue</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/welcome.css">

</head>


<body>


<!-- ==========================================
     TOP BAR
========================================== -->

<header id="topbar">


<div id="logo">

🎬 StageCue

</div>


<div id="toolbar">


<button id="openFiles">
Open
</button>


<button id="savePlaylist">
Save
</button>


<button id="loadPlaylist">
Load
</button>


<button id="outputWindow">
Output
</button>


<button id="fullscreen">
Fullscreen
</button>


</div>


</header>




<!-- ==========================================
     WORKSPACE
========================================== -->

<main id="workspace">



<!-- ==========================================
     PLAYLIST
========================================== -->


<aside id="playlistPanel">


<div class="panelHeader">

Playlist

<span id="playlistCount">
0
</span>

</div>


<div id="playlist">

</div>


</aside>





<!-- ==========================================
     PREVIEW + TIMELINE
========================================== -->


<section id="previewPanel">



<!-- VIDEO -->

<div id="videoContainer">


<video
id="preview"
playsinline
preload="metadata">
</video>


<div id="previewOverlay">

READY

</div>


</div>





<!-- TIMELINE -->

<div id="timeline">



<!-- TIME CONTROL -->

<div class="timeline-toolbar">


<span id="current">
00:00
</span>


<input
type="range"
id="seek"
min="0"
max="100"
value="0">


<span id="duration">
00:00
</span>


</div>





<!-- RULER -->

<div class="timeline-ruler">


<canvas></canvas>


</div>





<!-- WAVEFORM -->

<div class="timeline-waveform">


<canvas></canvas>


</div>





<!-- AUDIO VISUALIZER -->

<div class="timeline-spectrum">


<canvas></canvas>


</div>



</div>




</section>


</main>





<!-- ==========================================
     TRANSPORT
========================================== -->


<footer id="transport">



<div>


<button id="previous">
⏮
</button>


<button id="play">
▶
</button>


<button id="pause">
⏸
</button>


<button id="stop">
⏹
</button>


<button id="next">
⏭
</button>


</div>





<div id="volumeBox">


🔊


<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">


</div>





<label>


<input
type="checkbox"
id="loopPlaylist">


Loop Playlist


</label>




</footer>





<!-- ==========================================
     FILE INPUT
========================================== -->


<input
type="file"
id="filePicker"
accept="video/*"
multiple
hidden>





<script
type="module"
src="js/app.js">
</script>


</body>


</html>
